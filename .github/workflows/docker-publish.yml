name: docker-publish
on:
  push:
    branches: [main, master]
jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - image: mancala-motor
            context: ./motor
          - image: mancala-backend
            context: ./backend
          - image: mancala-frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build y push (Docker Hub, tags 1.0.0 + SHA)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            alejo0213/${{ matrix.image }}:1.0.0
            alejo0213/${{ matrix.image }}:${{ github.sha }}
